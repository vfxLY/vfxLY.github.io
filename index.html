<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComfyUI 图像生成</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#007AFF', 
                        secondary: '#34C759', 
                        sdxl_primary: '#5856D6', 
                        sdxl_dark: '#1D1D1F',
                        sdxl_light: '#F5F5F7',
                        neutral: '#1D1D1F',
                        light: '#F5F5F7',
                        appleGray: '#86868B',
                        appleDark: '#1D1D1F'
                    },
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'SF Pro Display', 'SF Pro Text', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        
        @layer base {
            * {
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }
            body {
                background: linear-gradient(135deg, #F5F5F7 0%, #FFFFFF 100%);
                min-height: 100vh;
            }
        }
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .progress-bar {
                transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .card-shadow {
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08), 0 1px 3px rgba(0, 0, 0, 0.04);
                backdrop-filter: blur(20px);
            }
            .card-shadow:hover {
                box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12), 0 2px 6px rgba(0, 0, 0, 0.06);
                transform: translateY(-2px);
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .apple-button {
                background: linear-gradient(180deg, #007AFF 0%, #0051D5 100%);
                box-shadow: 0 2px 8px rgba(0, 122, 255, 0.3);
                transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .apple-button:hover {
                background: linear-gradient(180deg, #0051D5 0%, #003D9E 100%);
                box-shadow: 0 4px 12px rgba(0, 122, 255, 0.4);
                transform: translateY(-1px);
            }
            .apple-button:active {
                transform: translateY(0);
                box-shadow: 0 1px 4px rgba(0, 122, 255, 0.3);
            }
            .drop-area-active {
                border-color: #007AFF;
                background-color: rgba(0, 122, 255, 0.05);
            }
            .sdxl-gradient-bg {
                background: linear-gradient(135deg, #5856D6 0%, #34C759 100%);
            }
            .sdxl-card-shadow {
                box-shadow: 0 4px 20px rgba(88, 86, 214, 0.12), 0 1px 3px rgba(88, 86, 214, 0.08);
            }
            .sdxl-card-shadow:hover {
                box-shadow: 0 8px 30px rgba(88, 86, 214, 0.18), 0 2px 6px rgba(88, 86, 214, 0.12);
            }
            .sdxl-accent-primary {
                accent-color: #5856D6;
            }
            .apple-input {
                background: rgba(255, 255, 255, 0.8);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(0, 0, 0, 0.1);
                transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .apple-input:focus {
                background: rgba(255, 255, 255, 0.95);
                border-color: #007AFF;
                box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1);
                outline: none;
            }
            .glass-effect {
                background: rgba(255, 255, 255, 0.7);
                backdrop-filter: blur(20px) saturate(180%);
                -webkit-backdrop-filter: blur(20px) saturate(180%);
            }
        }
    </style>
</head>
<body class="min-h-screen font-sans">
    <div class="container mx-auto px-4 py-12 max-w-7xl">
        <header class="mb-12 text-center">
            <h1 class="text-[clamp(2rem,5vw,3rem)] font-semibold text-appleDark mb-3 tracking-tight">ComfyUI 图像生成</h1>
            <p class="text-appleGray text-lg">创造无限可能</p>
        </header>

        <div class="mb-8">
            <ul class="flex flex-wrap justify-center gap-2 text-sm font-medium" id="toolTabs" role="tablist">
                <li role="presentation">
                    <button id="tab-advanced-generate" data-tab-target="advanced-generate" type="button" role="tab" aria-controls="advanced-generate" aria-selected="true"
                        class="inline-block px-6 py-3 rounded-full text-white bg-primary hover:bg-primary/90 transition-all duration-300 shadow-lg hover:shadow-xl">
                        <i class="fa fa-magic mr-2"></i> 高级图像生成
                    </button>
                </li>
                <li role="presentation">
                    <button id="tab-image-edit" data-tab-target="image-edit" type="button" role="tab" aria-controls="image-edit" aria-selected="false"
                        class="inline-block px-6 py-3 rounded-full text-appleDark bg-white hover:bg-gray-50 transition-all duration-300 shadow-sm hover:shadow-md border border-gray-200">
                        <i class="fa fa-pencil-square-o mr-2"></i> 图片修改
                    </button>
                </li>
                <li role="presentation">
                    <button id="tab-sdxl-generate" data-tab-target="sdxl-generate" type="button" role="tab" aria-controls="sdxl-generate" aria-selected="false"
                        class="inline-block px-6 py-3 rounded-full text-appleDark bg-white hover:bg-gray-50 transition-all duration-300 shadow-sm hover:shadow-md border border-gray-200">
                        <i class="fa fa-photo mr-2"></i> SDXL 快速生成
                    </button>
                </li>
            </ul>
        </div>

        <div id="toolContents">
            <div id="advanced-generate" role="tabpanel" aria-labelledby="tab-advanced-generate" class="tab-content">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-1">
                        <div class="glass-effect rounded-2xl p-8 card-shadow">
                            <h2 class="text-2xl font-semibold mb-6 text-appleDark flex items-center">
                                <i class="fa fa-sliders mr-3 text-primary"></i> 生成设置
                            </h2>
                            
                            <div class="space-y-6">
                                <div class="hidden">
                                    <label for="ag_serverUrl" class="block text-sm font-medium text-gray-700 mb-1">服务器地址</label>
                                    <input 
                                        type="text" 
                                        id="ag_serverUrl" 
                                        value="http://17610400098.top" 
                                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition"
                                    >
                                </div>

                                <div>
                                    <label for="ag_prompt" class="block text-sm font-medium text-appleDark mb-2">提示词</label>
                                    <textarea 
                                        id="ag_prompt" 
                                        rows="10" 
                                        placeholder="输入描述文本..." 
                                        class="w-full px-4 py-3 apple-input rounded-xl resize-none"
                                    >在金庸《神雕侠侣》原著剧情中，古墓派传人小龙女被点中穴道而全身瘫软无力，双眼蒙以白布，她躺在简陋的客栈木床上，姿势侧卧蜷缩，乌黑的长发散乱披覆在肩头和枕边，宛如一朵凋零的白莲，肌肤如凝脂般细腻苍白，脸庞精致绝美却带着无助的茫然与惊恐，樱唇微张似欲呼喊却发不出声，身上那袭标志性的纯白纱裙轻薄贴身，裙摆微微掀起露出修长玉腿，裙领松散滑落肩头显露出锁骨与半边香肩，胸前曲线玲珑起伏却被薄纱勉强遮掩，乳峰隐约轮廓分明而乳晕与乳头完全被衣料覆盖，未露一丝春光，下身私处亦被裙裾严实裹住无任何暴露，她的手臂无力垂落床沿，指尖微颤显示内心的挣扎与羞愤；尹志平身为全真教道士，身着青色道袍，腰系玄色腰带，头裹道巾，面容英俊有三缕长须，扭曲成兽欲横行的淫笑，他跪伏在床榻边，一手粗暴按住小龙女纤细腰肢固定其身躯，另一手在抚摸她的阴部，粗鲁地分开她无力并拢的双腿，动作充满原始的侵犯与亵渎，整个场景置于昏黄烛光摇曳的古风客栈内室，木质屏风后隐约可见江湖刀剑痕迹，空气中弥漫着淡淡药香与尘土气息，低角度仰视构图强调小龙女的无助脆弱与尹志平的俯身压迫，烛火从左侧投下柔和暖光，在她白裙与肌肤上拉出长影，营造出压抑而悲剧性的氛围，画面以写实水墨风格渲染，细腻笔触勾勒人物衣纹与表情微妙变化，墨色晕染增强情感张力，整体构图遵循三等分法则，将小龙女置于黄金分割点突出其纯洁遭玷污的凄美悲情。

照片的左上角有"REDQ+ WAN"的精美艺术字水印</textarea>
                                </div>

                                <div class="flex items-center justify-between glass-effect p-4 rounded-xl border border-gray-200/50">
                                    <div class="flex flex-col">
                                        <span class="text-sm font-medium text-appleDark">启用 卡通LoRA</span>
                                        <span class="text-xs text-appleGray mt-0.5">使用预设的模型微调风格</span>
                                    </div>
                                    <label class="relative inline-flex items-center cursor-pointer">
                                        <input type="checkbox" id="ag_enableLora" class="sr-only peer" checked>
                                        <div class="w-11 h-6 bg-gray-300 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-primary/30 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary shadow-inner"></div>
                                    </label>
                                </div>

                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <label for="ag_width" class="block text-sm font-medium text-appleDark mb-2">宽度: <span id="ag_widthValue" class="text-primary font-semibold">1280</span></label>
                                        <input 
                                            type="range" 
                                            id="ag_width" 
                                            min="512" 
                                            max="4096" 
                                            step="64" 
                                            value="1280" 
                                            class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-primary"
                                        >
                                    </div>
                                    <div>
                                        <label for="ag_height" class="block text-sm font-medium text-appleDark mb-2">高度: <span id="ag_heightValue" class="text-primary font-semibold">720</span></label>
                                        <input 
                                            type="range" 
                                            id="ag_height" 
                                            min="512" 
                                            max="4096" 
                                            step="64" 
                                            value="720" 
                                            class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-primary"
                                        >
                                    </div>
                                </div>

                                <div>
                                    <label for="ag_steps" class="block text-sm font-medium text-appleDark mb-2">生成步数: <span id="ag_stepsValue" class="text-primary font-semibold">10</span></label>
                                    <input 
                                        type="range" 
                                        id="ag_steps" 
                                        min="1" 
                                        max="50" 
                                        step="1" 
                                        value="10" 
                                        class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-primary"
                                    >
                                </div>

                                <button 
                                    id="ag_generateBtn" 
                                    class="w-full apple-button text-white font-semibold py-4 px-6 rounded-xl flex items-center justify-center gap-2 text-base"
                                >
                                    <i class="fa fa-magic"></i>
                                    <span>生成图像</span>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="lg:col-span-2">
                        <div class="glass-effect rounded-2xl p-8 h-full card-shadow">
                            <h2 class="text-2xl font-semibold mb-6 text-appleDark flex items-center">
                                <i class="fa fa-image mr-3 text-primary"></i> 生成结果
                            </h2>
                            
                            <div id="ag_progressContainer" class="mb-4 hidden">
                                <div class="text-sm text-gray-600 mb-1 flex justify-between">
                                    <span id="ag_progressText">生成中...</span>
                                    <span id="ag_progressPercent">0%</span>
                                </div>
                                <div class="h-2 bg-gray-200 rounded-full overflow-hidden">
                                    <div id="ag_progressBar" class="progress-bar h-full bg-secondary w-0"></div>
                                </div>
                                <div id="ag_consoleProgress" class="text-xs text-gray-500 mt-1 hidden">
                                    <i class="fa fa-terminal mr-1"></i>
                                    <span id="ag_consoleProgressText"></span>
                                </div>
                            </div>
                            
                            <div id="ag_errorContainer" class="mb-4 hidden p-4 bg-red-50 border border-red-200 rounded-lg">
                                <div class="flex items-start">
                                    <i class="fa fa-exclamation-circle text-red-500 mt-0.5 mr-3"></i>
                                    <p id="ag_errorMessage" class="text-red-700 text-sm"></p>
                                </div>
                            </div>
                            
                            <div id="ag_imageContainer" class="flex items-center justify-center min-h-[600px] border-2 border-dashed border-gray-300/50 rounded-2xl overflow-hidden bg-gradient-to-br from-gray-50 to-white">
                                <div id="ag_placeholder" class="text-center text-appleGray p-6">
                                    <i class="fa fa-picture-o text-6xl mb-4 opacity-40"></i>
                                    <p class="text-lg">点击生成按钮开始创建图像</p>
                                </div>
                                <img id="ag_resultImage" src="" alt="生成的图像" class="max-w-full max-h-[600px] hidden rounded-xl shadow-2xl">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="image-edit" role="tabpanel" aria-labelledby="tab-image-edit" class="tab-content hidden">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-1">
                        <div class="glass-effect rounded-2xl p-8 card-shadow">
                            <h2 class="text-2xl font-semibold mb-6 flex items-center text-appleDark">
                                <i class="fa fa-sliders text-primary mr-3"></i> 生成设置
                            </h2>
                            
                            <div class="space-y-6">
                                <div class="hidden">
                                    <label for="ie_serverUrl" class="block text-sm font-medium text-gray-700 mb-1">服务器地址</label>
                                    <input type="text" id="ie_serverUrl" 
                                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition"
                                        placeholder="http://17610400098.top" value="http://17610400098.top">
                                </div>

                                <div>
                                    <label for="ie_prompt" class="block text-sm font-medium text-appleDark mb-2">提示词</label>
                                    <textarea id="ie_prompt" rows="3" 
                                        class="w-full px-4 py-3 apple-input rounded-xl resize-none"
                                        placeholder="输入修改指令...">修改姿势敞开衣服露出诱人的胸部 穿着黑丝内衣</textarea>
                                </div>

                                <div>
                                    <label class="block text-sm font-medium text-appleDark mb-2">上传图片</label>
                                    <div id="ie_dropArea" class="border-2 border-dashed border-gray-300/50 rounded-xl p-6 text-center hover:bg-gray-50/50 transition cursor-pointer glass-effect">
                                        <input type="file" id="ie_imageUpload" accept="image/*" class="hidden">
                                        <label for="ie_imageUpload" class="cursor-pointer">
                                            <div id="ie_uploadPrompt" class="py-4">
                                                <i class="fa fa-cloud-upload text-appleGray text-3xl mb-3"></i>
                                                <p class="text-sm text-appleGray">点击或拖拽图片到此处上传</p>
                                            </div>
                                            <div id="ie_imagePreviewContainer" class="hidden w-full h-48 overflow-hidden rounded-xl">
                                                <img id="ie_imagePreview" src="" alt="预览图" class="w-full h-full object-contain rounded-xl">
                                            </div>
                                        </label>
                                    </div>
                                    <p id="ie_imageName" class="text-xs text-appleGray mt-2 hidden"></p>
                                </div>

                                <div>
                                    <div class="flex justify-between mb-1">
                                        <label for="ie_steps" class="block text-sm font-medium text-gray-700">生成步数</label>
                                        <span id="ie_stepsValue" class="text-sm text-gray-500">20</span>
                                    </div>
                                    <input type="range" id="ie_steps" min="10" max="100" step="5" value="20" 
                                        class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-primary">
                                    <p class="text-xs text-gray-500 mt-1">更多步数可能获得更好效果，但耗时更长</p>
                                </div>

                                <div>
                                    <div class="flex justify-between mb-1">
                                        <label for="ie_cfg" class="block text-sm font-medium text-gray-700">CFG 系数</label>
                                        <span id="ie_cfgValue" class="text-sm text-gray-500">2.5</span>
                                    </div>
                                    <input type="range" id="ie_cfg" min="0.5" max="10" step="0.5" value="2.5" 
                                        class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-primary">
                                    <p class="text-xs text-gray-500 mt-1">控制提示词对生成结果的影响程度</p>
                                </div>

                                <button id="ie_generateBtn" 
                                    class="w-full apple-button text-white font-semibold py-4 px-6 rounded-xl flex items-center justify-center text-base">
                                    <i class="fa fa-magic mr-2"></i> 生成图片
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="lg:col-span-2">
                        <div class="glass-effect rounded-2xl p-8 card-shadow h-full flex flex-col">
                            <h2 class="text-2xl font-semibold mb-6 flex items-center text-appleDark">
                                <i class="fa fa-image text-primary mr-3"></i> 生成结果
                            </h2>
                            
                            <div id="ie_progressContainer" class="mb-4 hidden">
                                <div class="flex justify-between text-sm mb-1">
                                    <span>生成进度</span>
                                    <span id="ie_progressPercentage">0%</span>
                                </div>
                                <div class="h-2 bg-gray-200 rounded-full overflow-hidden">
                                    <div id="ie_progressBar" class="progress-bar h-full bg-secondary w-0"></div>
                                </div>
                                <p id="ie_progressText" class="text-xs text-gray-500 mt-1">准备开始...</p>
                            </div>

                            <div id="ie_errorContainer" class="mb-4 p-4 bg-red-50 border border-red-200 rounded-lg hidden">
                                <div class="flex">
                                    <i class="fa fa-exclamation-circle text-red-500 mt-0.5 mr-2"></i>
                                    <p id="ie_errorMessage" class="text-sm text-red-700"></p>
                                </div>
                            </div>

                            <div id="ie_imageContainer" class="flex-grow flex flex-col items-center justify-center border-2 border-dashed border-gray-300/50 rounded-2xl overflow-hidden bg-gradient-to-br from-gray-50 to-white">
                                <div id="ie_emptyState" class="text-center p-8">
                                    <i class="fa fa-picture-o text-appleGray text-6xl mb-4 opacity-40"></i>
                                    <p class="text-appleGray text-lg">生成的图片将显示在这里</p>
                                    <p class="text-xs text-appleGray mt-2 opacity-70">请上传图片并点击生成按钮</p>
                                </div>
                                <img id="ie_resultImage" src="" alt="生成结果" class="max-w-full max-h-full object-contain hidden rounded-xl shadow-2xl">
                            </div>

                            <div id="ie_imageActions" class="mt-6 flex justify-center gap-3 hidden">
                                <button id="ie_downloadBtn" class="bg-white hover:bg-gray-50 text-appleDark font-medium py-3 px-6 rounded-xl transition flex items-center shadow-sm hover:shadow-md border border-gray-200">
                                    <i class="fa fa-download mr-2"></i> 下载
                                </button>
                                <button id="ie_newGenerateBtn" class="apple-button text-white font-semibold py-3 px-6 rounded-xl flex items-center">
                                    <i class="fa fa-refresh mr-2"></i> 重新生成
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="sdxl-generate" role="tabpanel" aria-labelledby="tab-sdxl-generate" class="tab-content hidden">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-1">
                        <div class="glass-effect rounded-2xl p-8 sdxl-card-shadow">
                            <h2 class="text-2xl font-semibold mb-6 text-appleDark flex items-center">
                                <i class="fa fa-sliders mr-3 text-sdxl_primary"></i>生成设置
                            </h2>
                            
                            <div class="space-y-6">
                                <div class="hidden">
                                    <label for="sdxl_serverUrl" class="block text-sm font-medium text-gray-700 mb-1">服务器地址</label>
                                    <div class="relative">
                                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500">
                                            <i class="fa fa-server"></i>
                                        </span>
                                        <input 
                                            type="text" 
                                            id="sdxl_serverUrl" 
                                            class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-sdxl_primary focus:border-sdxl_primary transition-all"
                                            placeholder="http://17610400098.top"
                                            value="http://17610400098.top"
                                        >
                                    </div>
                                </div>

                                <div>
                                    <label for="sdxl_positivePrompt" class="block text-sm font-medium text-appleDark mb-2">正向提示词</label>
                                    <textarea 
                                        id="sdxl_positivePrompt" 
                                        rows="4" 
                                        class="w-full px-4 py-3 apple-input rounded-xl resize-none"
                                        placeholder="输入描述性提示词..."
                                    >the best quality, the best resolution, masterpiece, Sharp image)
(realistic skin, sweat, detailed skin pore)
1girl, 18 yo, solo, long hair, looking at viewer, smile, brown hair, thighhighs, very small ass, skinny body, heart, indoors, artist name, hood, sleeves past wrists, lips, pillow, hoodie, bed, no panties, on bed, bottomless, hood down, all fours, freckles, nose, top-down bottom-up, white thighhighs, white hoodie</textarea>
                                </div>

                                <div>
                                    <label for="sdxl_negativePrompt" class="block text-sm font-medium text-appleDark mb-2">反向提示词</label>
                                    <textarea 
                                        id="sdxl_negativePrompt" 
                                        rows="3" 
                                        class="w-full px-4 py-3 apple-input rounded-xl resize-none"
                                        placeholder="输入需要避免的特征..."
                                    >bad quality,worst quality,worst detail,sketch,censor, extra limbs, deformed fingers, bad anatomy, mutated body, lowres, worst quality, low quality, low score, bad score, blurry, text, ugly, hooded eyes, watermark, pale, bad hands, bad anatomy, bad proportions, poorly drawn face, poorly drawn hand, missing finger, extra limbs, blurry, pixelated, distorted, lowres, jpeg artifacts, watermark, signature, text, (deformed:1.5), (bad hand:1.3), overexposed, underexposed, censored, mutated, extra finger, cloned face, bad eyes,</textarea>
                                </div>

                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <label for="sdxl_width" class="block text-sm font-medium text-appleDark mb-2">宽度 <span id="sdxl_widthValue" class="text-sdxl_primary font-semibold">1280</span></label>
                                        <input

                                        <input 
                                            type="range" 
                                            id="sdxl_height" 
                                            min="512" 
                                            max="2048" 
                                            step="64" 
                                            value="720"
                                            class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer sdxl-accent-primary"
                                        >

                                <div>
                                    <label for="sdxl_steps" class="block text-sm font-medium text-appleDark mb-2">生成步数 <span id="sdxl_stepsValue" class="text-sdxl_primary font-semibold">10</span></label>
                                    <input 
                                        type="range"

                                        min="10" 
                                        max="100"

                                        value="10"

                                <div>
                                    <label for="sdxl_cfg" class="block text-sm font-medium text-appleDark mb-2">CFG 比例 <span id="sdxl_cfgValue" class="text-sdxl_primary font-semibold">2.5</span></label>
                                    <input

                                    style="background: linear-gradient(180deg, #5856D6 0%, #3D3BB8 100%); box-shadow: 0 2px 8px rgba(88, 86, 214, 0.3);"
                                    onmouseover="this.style.background='linear-gradient(180deg, #3D3BB8 0%, #2A2880 100%)'; this.style.boxShadow='0 4px 12px rgba(88, 86, 214, 0.4)';"
                                    onmouseout="this.style.background='linear-gradient(180deg, #5856D6 0%, #3D3BB8 100%)'; this.style.boxShadow='0 2px 8px rgba(88, 86, 214, 0.3)';"
